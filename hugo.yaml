baseurl: https://ye-guan-xing.github.io/
languageCode: en-us
theme: hugo-theme-stack
title: Example Site
copyright: acye

# Theme i18n support
# Available values: ar, bn, ca, de, el, en, es, fr, hu, id, it, ja, ko, nl, pt-br, th, uk, zh-cn, zh-hk, zh-tw
DefaultContentLanguage: zh-cn

# Set hasCJKLanguage to true if DefaultContentLanguage is in [zh-cn ja ko]
# This will make .Summary and .WordCount behave correctly for CJK languages.
hasCJKLanguage: true

languages:
  # en:
  #可以加上，来实现语言切换
  zh-cn:
    languageName: 简体中文
    title: acye's blog
    weight: 2
    params:
      sidebar:
        subtitle: 欢迎来到我的博客QWQ

services:
  # Change it to your Disqus shortname before using
  disqus:
    shortname: "hugo-theme-stack"
  # GA Tracking ID
  googleAnalytics:
    id:

pagination:
  pagerSize: 10

permalinks:
  post: /p/:slug/
  page: /:slug/

params:
  mainSections:
    - post
  featuredImageField: image
  rssFullContent: true
  favicon: # e.g.: favicon placed in `static/favicon.ico` of your site folder, then set this field to `/favicon.ico` (`/` is necessary)

  footer:
    since: 2025
    customText:

  dateFormat:
    #是格式，不是日期
    published: "2006-01-02 15:04 MST"
    lastUpdated: "Jan 02, 2006 15:04 MST"

  sidebar:
    emoji: 🤫
    subtitle: "欢迎来到我的博客,这里边主要放置我写的一些笔记,方便复习和查阅"
    avatar:
      enabled: true
      local: true
      src: img/avatar.png

  article:
    math: false
    toc: true
    readingTime: true
    license:
      enabled: false
      default: Licensed under CC BY-NC-SA 4.0

  comments:
    enabled: true
    provider: waline

    disqusjs:
      shortname:
      apiUrl:
      apiKey:
      admin:
      adminLabel:

    utterances:
      repo:
      issueTerm: pathname
      label:

    beaudar:
      repo:
      issueTerm: pathname
      label:
      theme:

    remark42:
      host:
      site:
      locale:

    vssue:
      platform:
      owner:
      repo:
      clientId:
      clientSecret:
      autoCreateIssue: false

    # Waline client configuration see: https://waline.js.org/en/reference/component.html
    waline:
      serverURL: https://www.acyeapp.top
      imageUploader: false
      lang: en
      meta:
        - nick
        - mail
      pageview: false
      comment: false
      emoji:
        - https://unpkg.com/@waline/emojis@1.2.0/tieba
        - https://unpkg.com/@waline/emojis@1.2.0/bilibili
        - https://unpkg.com/@waline/emojis@1.2.0/bmoji
        - https://unpkg.com/@waline/emojis@1.2.0/weibo
      reaction:
        - https://npm.elemecdn.com/@waline/emojis@1.1.0/bilibili/bb_heart_eyes.png
        - https://npm.elemecdn.com/@waline/emojis@1.1.0/bilibili/bb_thumbsup.png
        - https://npm.elemecdn.com/@waline/emojis@1.1.0/bilibili/bb_zhoumei.png
        - https://npm.elemecdn.com/@waline/emojis@1.1.0/bilibili/bb_grievance.png
        - https://npm.elemecdn.com/@waline/emojis@1.1.0/bilibili/bb_dizzy_face.png
        - https://npm.elemecdn.com/@waline/emojis@1.1.0/bilibili/bb_slap.png
      requiredMeta:
        - nick
        - mail
      requiredMetaNames:
        - nick
        - mail
      highlighter: true
      locale:
        admin: Admin
        placeholder: "Welcome to leave your valuable comments!\nPlease provide a correct email address so that we can send you an email notification when there is a reply.\nDo not post any content unrelated to this article."
        reactionTitle: Was this article helpful to you?
        reaction0: Very helpful
        reaction1: Helpful
        reaction2: Average
        reaction3: Not helpful
        reaction4: Confused
        reaction5: Incorrect

    twikoo:
      envId:
      region:
      path:
      lang:

    # See https://cactus.chat/docs/reference/web-client/#configuration for description of the various options
    cactus:
      defaultHomeserverUrl: "https://matrix.cactus.chat:8448"
      serverName: "cactus.chat"
      siteName: "" # You must insert a unique identifier here matching the one you registered (See https://cactus.chat/docs/getting-started/quick-start/#register-your-site)

    giscus:
      repo:
      repoID:
      category:
      categoryID:
      mapping:
      lightTheme:
      darkTheme:
      reactionsEnabled: 1
      emitMetadata: 0

    gitalk:
      owner:
      admin:
      repo:
      clientID:
      clientSecret:
      proxy:

    cusdis:
      host:
      id:
  #组件：可以加一些好玩的功能  eg:Aplayer+MetingJS
  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 5
      - type: categories
        params:
          limit: 10
      #标签云
      # - type: tag-cloud
      #   params:
      #       limit: 10
    page:
      - type: toc

  opengraph:
    twitter:
      # Your Twitter username
      site:

      # Available values: summary, summary_large_image
      card: summary_large_image

  defaultImage:
    opengraph:
      enabled: false
      local: false
      src:

  colorScheme:
    # 颜色可以自己加
    # Display toggle
    toggle: true

    # Available values: auto, light, dark
    default: auto

  imageProcessing:
    cover:
      enabled: true
    content:
      enabled: true

### Custom menu
### See https://stack.jimmycai.com/config/menu
### To remove about, archive and search page menu item, remove `menu` field from their FrontMatter
menu:
  main: []
  #放置一些社交图标
  social:
    - identifier: github
      name: GitHub
      url: https://github.com/ye-guan-xing
      params:
        icon: brand-github

    - identifier: twitter
      name: Twitter
      url: https://twitter.com
      params:
        icon: brand-twitter

related:
  includeNewer: true
  threshold: 60
  toLower: false
  indices:
    - name: tags
      weight: 100

    - name: categories
      weight: 200

markup:
  goldmark:
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - - \[
              - \]
            - - $$
              - $$
          inline:
            - - \(
              - \)
    renderer:
      ## Set to true if you have HTML content inside Markdown
      unsafe: true
  tableOfContents:
    endLevel: 4
    ordered: true
    startLevel: 2
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNoStart: 1
    lineNos: true
    lineNumbersInTable: true
    tabWidth: 4
